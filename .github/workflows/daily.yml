name: Daily index valuation

on:
  schedule:
    # 每个工作日 UTC 09/11/13 各跑一次（北京 17/19/21 点），多个错峰入口防止 GitHub 丢调度。
    # 写入按「日期+代码」合并，多跑几次只会覆盖同一行，幂等无副作用。
    - cron: "0 9,11,13 * * 1-5"
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch & push
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SHEET_NAME: 指数价格
        run: python fetch_index_valuation.py
